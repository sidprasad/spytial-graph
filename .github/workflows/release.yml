name: Release

# Publishing uses npm trusted publishing (OIDC) — no NPM_TOKEN secret to store.
#
# One-time bootstrap (npm has no "pending publisher", so the package must exist
# on npm before a trusted publisher can be attached):
#   1. Publish the first version locally:   npm login && npm publish
#   2. npmjs.com -> spytial-graph -> Settings -> Trusted Publisher, add:
#        repository: sidprasad/spytial-graph
#        workflow:   release.yml
# After that, every `git push origin vX.Y.Z` tag publishes via OIDC here — no token.

on:
  push:
    tags: ['v*']

permissions:
  id-token: write   # mint the OIDC token npm exchanges for short-lived credentials
  contents: write   # create the GitHub release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'           # trusted publishing needs Node >= 22.14
      - run: npm install -g npm@latest  # ...and npm >= 11.5.1
      - run: npm test
      - run: npm publish --provenance --access public
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

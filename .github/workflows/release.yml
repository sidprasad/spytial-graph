name: Release

# Cut a release by pushing a version tag:
#   npm version 0.2.0-prototype --no-git-tag-version   # if bumping
#   git tag v0.2.0-prototype && git push origin v0.2.0-prototype
# Requires an NPM_TOKEN repository secret (npm automation token).

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub release
  id-token: write   # npm provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
